services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: steamstore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Database=steamstore;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379"
      Steam__ApiKey: "${STEAM_API_KEY}"
      Steam__SteamId: "${STEAM_ID}"
      Steam__SyncIntervalMinutes: "30"
      Frontend__Origin: "http://localhost:3000"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
    environment:
      API_BASE_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  postgres_data:
